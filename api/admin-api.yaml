openapi: "3.0.3"
info:
  title: SignalDB Admin API
  version: "1.0.0"
  description: Tenant management API for SignalDB
servers:
  - url: /api/v1/admin
    description: Admin API prefix
security:
  - bearerAuth: []
tags:
  - name: tenants
    description: Tenant management
  - name: api-keys
    description: API key management
  - name: datasets
    description: Dataset management
  - name: profiles
    description: Pyroscope-compatible profile queries
paths:
  /tenants:
    get:
      operationId: list_tenants
      summary: List all tenants
      tags: [tenants]
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTenantsResponse"
    post:
      operationId: create_tenant
      summary: Create a new tenant
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Tenant already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /tenants/{tenant_id}:
    parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
        description: Tenant identifier
    get:
      operationId: get_tenant
      summary: Get a tenant by ID
      tags: [tenants]
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: update_tenant
      summary: Update a tenant
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantResponse"
        "403":
          description: Config-sourced tenants cannot be modified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: delete_tenant
      summary: Delete a tenant
      tags: [tenants]
      responses:
        "204":
          description: Tenant deleted
        "403":
          description: Config-sourced tenants cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /tenants/{tenant_id}/api-keys:
    parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
        description: Tenant identifier
    get:
      operationId: list_api_keys
      summary: List API keys for a tenant
      tags: [api-keys]
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApiKeysResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: create_api_key
      summary: Create a new API key for a tenant
      tags: [api-keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created (raw key shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /tenants/{tenant_id}/api-keys/{key_id}:
    parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
        description: Tenant identifier
      - name: key_id
        in: path
        required: true
        schema:
          type: string
        description: API key identifier
    delete:
      operationId: revoke_api_key
      summary: Revoke an API key
      tags: [api-keys]
      responses:
        "204":
          description: API key revoked
        "404":
          description: API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /tenants/{tenant_id}/datasets:
    parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
        description: Tenant identifier
    get:
      operationId: list_datasets
      summary: List datasets for a tenant
      tags: [datasets]
      responses:
        "200":
          description: List of datasets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatasetsResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: create_dataset
      summary: Create a new dataset for a tenant
      tags: [datasets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetRequest"
      responses:
        "201":
          description: Dataset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /tenants/{tenant_id}/datasets/{dataset_id}:
    parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
        description: Tenant identifier
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
        description: Dataset identifier
    delete:
      operationId: delete_dataset
      summary: Delete a dataset
      tags: [datasets]
      responses:
        "204":
          description: Dataset deleted
        "404":
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /pyroscope/render:
    servers:
      - url: /
        description: Served at the router root, not under the admin prefix
    get:
      operationId: render_profile_flamegraph
      summary: Render a flamegraph for a profile query and time range
      tags: [profiles]
      parameters:
        - name: query
          in: query
          description: "Pyroscope query, e.g. process_cpu:cpu:nanoseconds{service_name=\"checkout\"}"
          schema:
            type: string
        - name: from
          in: query
          description: Range start (unix seconds, unix milliseconds, or now-<N><s|m|h|d>)
          schema:
            type: string
        - name: until
          in: query
          description: Range end (same formats as from)
          schema:
            type: string
      responses:
        "200":
          description: Flamegraph in flamebearer encoding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PyroscopeRenderResponse"
  /pyroscope/render-diff:
    servers:
      - url: /
        description: Served at the router root, not under the admin prefix
    get:
      operationId: render_profile_diff
      summary: Render a differential flamegraph between two time ranges
      tags: [profiles]
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: leftFrom
          in: query
          description: Baseline range start
          schema:
            type: string
        - name: leftUntil
          in: query
          description: Baseline range end
          schema:
            type: string
        - name: rightFrom
          in: query
          description: Comparison range start
          schema:
            type: string
        - name: rightUntil
          in: query
          description: Comparison range end
          schema:
            type: string
      responses:
        "200":
          description: Differential flamegraph in double flamebearer encoding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PyroscopeRenderResponse"
  /pyroscope/label-names:
    servers:
      - url: /
        description: Served at the router root, not under the admin prefix
    get:
      operationId: list_profile_label_names
      summary: List label names present on stored profiles
      tags: [profiles]
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: until
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Available label names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PyroscopeLabelsResponse"
  /pyroscope/label-values:
    servers:
      - url: /
        description: Served at the router root, not under the admin prefix
    get:
      operationId: list_profile_label_values
      summary: List values for a profile label
      tags: [profiles]
      parameters:
        - name: label
          in: query
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: until
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Values for the label
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PyroscopeLabelsResponse"
        "400":
          description: Missing label parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /pyroscope/profile-types:
    servers:
      - url: /
        description: Served at the router root, not under the admin prefix
    get:
      operationId: list_profile_types
      summary: List available profile types
      tags: [profiles]
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: until
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Available profile types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PyroscopeProfileType"
  /api/profiles/trace/{trace_id}:
    servers:
      - url: /
        description: Served at the router root, not under the admin prefix
    get:
      operationId: list_profiles_for_trace
      summary: List summaries of profiles linked to a trace
      tags: [profiles]
      parameters:
        - name: trace_id
          in: path
          required: true
          description: Hex-encoded trace ID
          schema:
            type: string
      responses:
        "200":
          description: Profiles linked to the trace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TraceProfileSummary"
        "400":
          description: Invalid trace ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Admin API key passed as Bearer token
  schemas:
    ApiError:
      type: object
      description: Standard API error response
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error category
        message:
          type: string
          description: Human-readable error description
    CreateTenantRequest:
      type: object
      description: Request body for creating a new tenant
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique tenant identifier
        name:
          type: string
          description: Human-readable tenant name
        default_dataset:
          type: string
          description: Default dataset name
    UpdateTenantRequest:
      type: object
      description: Request body for updating an existing tenant
      properties:
        name:
          type: string
          description: Updated tenant name
        default_dataset:
          type: string
          description: Updated default dataset
    TenantResponse:
      type: object
      description: Tenant information returned by the API
      required:
        - id
        - name
        - source
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique tenant identifier
        name:
          type: string
          description: Human-readable tenant name
        default_dataset:
          type: string
          description: Default dataset name
        source:
          type: string
          description: Source of the tenant record (config or database)
        created_at:
          type: string
          description: ISO 8601 creation timestamp
        updated_at:
          type: string
          description: ISO 8601 last-updated timestamp
    ListTenantsResponse:
      type: object
      description: Response containing a list of tenants
      required:
        - tenants
      properties:
        tenants:
          type: array
          description: List of tenant records
          items:
            $ref: "#/components/schemas/TenantResponse"
    CreateApiKeyRequest:
      type: object
      description: Request body for creating a new API key
      properties:
        name:
          type: string
          description: Optional human-readable name for the key
    CreateApiKeyResponse:
      type: object
      description: Response returned when a new API key is created (includes the raw key)
      required:
        - id
        - key
        - created_at
      properties:
        id:
          type: string
          description: Unique key identifier
        key:
          type: string
          description: The raw API key (only shown once at creation time)
        name:
          type: string
          description: Optional human-readable name
        created_at:
          type: string
          description: ISO 8601 creation timestamp
    ApiKeyResponse:
      type: object
      description: API key information (without the raw key)
      required:
        - id
        - created_at
      properties:
        id:
          type: string
          description: Unique key identifier
        name:
          type: string
          description: Optional human-readable name
        created_at:
          type: string
          description: ISO 8601 creation timestamp
        revoked_at:
          type: string
          description: ISO 8601 revocation timestamp (if revoked)
    ListApiKeysResponse:
      type: object
      description: Response containing a list of API keys
      required:
        - api_keys
      properties:
        api_keys:
          type: array
          description: List of API key records (without raw keys)
          items:
            $ref: "#/components/schemas/ApiKeyResponse"
    CreateDatasetRequest:
      type: object
      description: Request body for creating a new dataset
      required:
        - name
      properties:
        name:
          type: string
          description: Dataset name
    DatasetResponse:
      type: object
      description: Dataset information returned by the API
      required:
        - id
        - name
        - tenant_id
        - created_at
      properties:
        id:
          type: string
          description: Unique dataset identifier
        name:
          type: string
          description: Dataset name
        tenant_id:
          type: string
          description: Tenant that owns this dataset
        created_at:
          type: string
          description: ISO 8601 creation timestamp
    ListDatasetsResponse:
      type: object
      description: Response containing a list of datasets
      required:
        - datasets
      properties:
        datasets:
          type: array
          description: List of dataset records
          items:
            $ref: "#/components/schemas/DatasetResponse"

    PyroscopeFlamebearer:
      type: object
      description: Flamegraph payload in flamebearer encoding
      required:
        - names
        - levels
        - numTicks
        - maxSelf
      properties:
        names:
          type: array
          description: Function name table referenced by block name indices
          items:
            type: string
        levels:
          type: array
          description: >-
            One flat array per depth level; single format uses
            [offset_delta, total, self, name_index] quadruples, double format
            uses septuples carrying baseline and comparison values
          items:
            type: array
            items:
              type: integer
              format: int64
        numTicks:
          type: integer
          format: int64
          description: Total number of ticks (root width)
        maxSelf:
          type: integer
          format: int64
          description: Largest self value of any block
    PyroscopeFlamebearerMetadata:
      type: object
      description: How to interpret flamebearer values
      required:
        - format
        - sampleRate
        - units
        - name
      properties:
        format:
          type: string
          description: single for one profile set, double for a diff
        spyName:
          type: string
          description: Profiler that produced the data
        sampleRate:
          type: integer
          format: int32
          description: Sample rate in Hz
        units:
          type: string
          description: Value units (samples, objects, bytes)
        name:
          type: string
          description: Display name of the rendered query
    PyroscopeTimeline:
      type: object
      description: Per-interval sample counts for the render timeline
      required:
        - startTime
        - samples
        - durationDelta
      properties:
        startTime:
          type: integer
          format: int64
          description: Start of the timeline, unix seconds
        samples:
          type: array
          items:
            type: integer
            format: int64
        durationDelta:
          type: integer
          format: int64
          description: Interval width in seconds
    PyroscopeRenderResponse:
      type: object
      description: Response of the render and render-diff endpoints
      required:
        - flamebearer
        - metadata
      properties:
        flamebearer:
          $ref: "#/components/schemas/PyroscopeFlamebearer"
        metadata:
          $ref: "#/components/schemas/PyroscopeFlamebearerMetadata"
        timeline:
          $ref: "#/components/schemas/PyroscopeTimeline"
        leftTicks:
          type: integer
          format: int64
          description: Total baseline ticks (double format only)
        rightTicks:
          type: integer
          format: int64
          description: Total comparison ticks (double format only)
    PyroscopeProfileType:
      type: object
      description: An available profile type
      required:
        - ID
        - name
        - sampleType
        - sampleUnit
      properties:
        ID:
          type: string
          description: Canonical profile type ID
        name:
          type: string
        sampleType:
          type: string
        sampleUnit:
          type: string
        periodType:
          type: string
        periodUnit:
          type: string
    PyroscopeLabelsResponse:
      type: object
      description: Label names or values
      required:
        - names
      properties:
        names:
          type: array
          items:
            type: string

    TraceProfileSummary:
      type: object
      description: Summary of a stored profile linked to a trace
      required:
        - profileID
        - timeUnixNano
        - durationNano
        - sampleType
        - sampleUnit
        - serviceName
      properties:
        profileID:
          type: string
          description: Hex-encoded profile ID
        timeUnixNano:
          type: string
          description: Collection time, unix nanoseconds as string
        durationNano:
          type: string
          description: Profile duration in nanoseconds as string
        sampleType:
          type: string
        sampleUnit:
          type: string
        serviceName:
          type: string
        spanID:
          type: string
          description: Hex-encoded span ID when the link names a span
