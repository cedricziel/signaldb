---
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      # These are peer deps of Cargo and should not be automatically bumped
      - dependency-name: "semver"
      - dependency-name: "crates-io"
      # Pinned to 1.3.3 for compatibility
      - dependency-name: "bincode"
    assignees:
      - cedricziel
    groups:
      datafusion-ecosystem:
        patterns:
          - "datafusion*"
          - "arrow*"
          - "parquet*"
          - "object_store*"
        update-types:
          - "minor"
          - "patch"
      serde:
        patterns:
          - "serde*"
      prost:
        patterns:
          - "prost*"
      opentelemetry:
        patterns:
          - "opentelemetry*"
      codegen-toolchain:
        patterns:
          - "progenitor*"
          - "typify"
          - "openapiv3"
          - "schemars"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - cedricziel
    ignore:
      # TypeScript 6+/7+ removed baseUrl/downlevelIteration/moduleResolution=node10,
      # which @grafana/tsconfig and the create-plugin scaffold still emit.
      # Remove once the Grafana plugin toolchain supports TypeScript 6+.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # eslint 10 removed context.getFilename(), which eslint-plugin-react
      # (peer range capped at eslint ^9.7) still calls. Remove once
      # eslint-plugin-react supports eslint 10.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      grafana-ecosystem:
        patterns:
          - "@grafana/*"
        update-types:
          - "minor"
          - "patch"
      react:
        patterns:
          - "react*"
          - "@types/react*"
      testing:
        patterns:
          - "jest*"
          - "@testing-library/*"
          - "@playwright/*"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "eslint*"
          - "typescript"
      build-tools:
        patterns:
          - "webpack*"
          - "@swc/*"
          - "sass*"

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "daily"
    assignees:
      - cedricziel
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    assignees:
      - cedricziel

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - cedricziel
