name: Doc Freshness

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check:
    name: Docs updated with their sources
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'docs-not-needed') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check doc freshness
        run: |
          if ! ./scripts/check-doc-freshness.sh "origin/${{ github.base_ref }}...HEAD" > report.txt; then
            echo "This PR changes files that the following living docs declare as sources," >&2
            echo "but the docs were not updated in the same PR:" >&2
            echo >&2
            cat report.txt >&2
            echo >&2
            echo "Update the listed docs/skills, or add the 'docs-not-needed' label if no" >&2
            echo "documentation change is genuinely required." >&2
            exit 1
          fi
