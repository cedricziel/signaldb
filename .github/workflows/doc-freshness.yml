name: Doc Freshness

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check:
    name: Docs updated with their sources
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'docs-not-needed') }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check doc freshness
        run: |
          if ! ./scripts/check-doc-freshness.sh "origin/${{ github.base_ref }}...HEAD" > report.txt; then
            echo "Doc hygiene check failed:" >&2
            echo >&2
            cat report.txt >&2
            echo >&2
            echo "Lines marked INVALID are frontmatter problems - fix the doc's" >&2
            echo "audience/type/status frontmatter (see .claude/skills/docs/SKILL.md)." >&2
            echo "Other lines are living docs whose declared sources changed in this PR" >&2
            echo "without a doc update - update them, or add the 'docs-not-needed' label" >&2
            echo "if no documentation change is genuinely required." >&2
            exit 1
          fi
